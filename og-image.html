<!doctype html>
<!-- og:image 생성용 1200×630 카드. Edge headless 로 og-image.png 로 렌더한다(소스 참고용으로 레포에도 보관). -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        font-family: 'Consolas', 'Malgun Gothic', monospace;
        background: radial-gradient(1200px 800px at 72% -10%, #0c1a18 0%, #05080a 55%);
        color: #c8ffe6;
        display: flex;
        align-items: center;
        gap: 40px;
        padding: 64px 72px;
        overflow: hidden;
      }
      .left { flex: 1; min-width: 0; }
      .badge {
        display: inline-flex; align-items: center; gap: 10px;
        font-size: 26px; font-weight: 800; letter-spacing: 1px;
        color: #00ff9c; border: 1px solid rgba(0,255,156,.4); border-radius: 8px;
        padding: 8px 16px; text-shadow: 0 0 14px rgba(0,255,156,.5);
      }
      h1 {
        font-size: 76px; font-weight: 800; line-height: 1.08; margin: 30px 0 0;
        color: #eafff5; text-shadow: 0 0 26px rgba(0,255,156,.28);
      }
      h1 .accent { color: #00ff9c; }
      h2 { font-size: 30px; font-weight: 600; color: #7fe9c4; margin: 22px 0 0; }
      .tags { margin-top: 30px; font-size: 21px; color: #4f7a6c; letter-spacing: .3px; }
      .right { width: 300px; height: 300px; position: relative; flex-shrink: 0; }
      .right .center {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .right .big { font-size: 110px; line-height: 1; color: #00ff9c; text-shadow: 0 0 28px rgba(0,255,156,.55); }
      .right .lab { margin-top: 8px; font-size: 20px; color: #7fe9c4; letter-spacing: 2px; }
    </style>
  </head>
  <body>
    <div class="left">
      <span class="badge">₿ BTC_SIGNAL</span>
      <h1>비트코인 <span class="accent">공포·탐욕 지수</span></h1>
      <h2>+ 매수 타이밍 점수 · 실시간 6개 지표</h2>
      <div class="tags">공포·탐욕 · RSI · MACD · 마이어 배수 · 낙폭 · 골든크로스</div>
    </div>
    <div class="right">
      <svg viewBox="0 0 210 210" width="300" height="300">
        <circle cx="105" cy="105" r="92" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="12" />
        <circle cx="105" cy="105" r="92" fill="none" stroke="#00ff9c" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="412 578" transform="rotate(-90 105 105)" />
      </svg>
      <div class="center">
        <div class="big">₿</div>
        <div class="lab">0 ~ 100</div>
      </div>
    </div>
  </body>
</html>
