name: Deploy demo to GitHub Pages

# Vite 빌드본(브라우저 Babel 제거 → 빠름)을 배포한다.
# 빌드 실패 시 자체완결 standalone.html 로 자동 폴백하여 라이브가 절대 깨지지 않게 한다.
# Pages 가 꺼져 있어도 configure-pages 의 enablement:true 가 자동으로 켜준다.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포 (진행 중이면 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (Vite) — 실패해도 계속(standalone 폴백)
        id: build
        continue-on-error: true
        run: npm install && npm run build

      - name: Assemble site (Vite 빌드본 우선, 실패 시 standalone 폴백)
        run: |
          mkdir -p _site
          if [ -f dist/index.html ]; then
            echo "→ Vite 빌드본 배포"
            cp -r dist/. _site/
          else
            echo "→ 빌드 실패: standalone 폴백 배포"
            cp standalone.html _site/index.html
          fi
          # 보조/SEO 자산은 항상 발행 (빌드본·폴백 공통)
          cp standalone.html _site/standalone.html
          cp sitemap.xml _site/sitemap.xml
          cp robots.txt _site/robots.txt
          cp og-image.png _site/og-image.png

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
