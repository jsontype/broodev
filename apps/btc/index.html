    <!-- ===== 컨트롤러: 구독 여부에 따라 라우팅 =====
         구독(유료) 사용자 → member/ (광고 없는 버전)
         그 외            → adsense/ (광고 버전, 기본)
         ***! TODO: 실제 구독 검증은 결제+인증 백엔드 연동 후. 서버가 발급한 세션/토큰(쿠키)으로
                    구독 여부를 판정해야 함. 아래는 임시 클라이언트측 플래그(우회 가능, 보안 아님). -->
    <script>
      (function () {
        try {
          var qs = new URLSearchParams(location.search);
          // 임시 토글: ?member=1 → 구독자 모드 저장 / ?member=0 → 해제 (개발·테스트용)
          if (qs.get('member') === '1') localStorage.setItem('btc:member', '1');
          if (qs.get('member') === '0') localStorage.removeItem('btc:member');
          var isMember = localStorage.getItem('btc:member') === '1';
          location.replace((isMember ? 'member/' : 'adsense/') + location.hash);
        } catch (e) {
          location.replace('adsense/');
        }
      })();
    </script>
